<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IAA 新游专区</title>
  <style>
    :root {
      --green: #00B86C;
      --green-dark: #019456;
      --green-soft: #E6F8EF;
      --text: #25282d;
      --secondary: #626a72;
      --muted: #92999f;
      --canvas: #f5f7f8;
      --white: #fff;
      --tile: #f7f8f8;
      --tag: #f3f4f5;
      --blue: #667c9f;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; }

    .page {
      width: min(1460px, calc(100vw - 80px));
      margin: 0 auto;
      padding: 36px 0 72px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.4;
      font-weight: 500;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .notice {
      width: 100%;
      margin-top: 22px;
      padding: 11px 16px;
      border: 0;
      border-radius: 4px;
      background: #fff7d6;
      color: #5e5539;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
    }

    .notice-link { margin-left: 8px; color: var(--blue); }

    /* ---- Section headings ---- */
    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 30px;
      margin-top: 32px;
      padding: 0 2px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 500;
    }

    .section-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .section-hint { color: var(--muted); font-size: 13px; }

    /* ---- Tool cards ---- */
    .tool-cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 22px 24px;
      border: 0;
      border-radius: 8px;
      background: var(--green-soft);
      color: var(--green-dark);
      cursor: pointer;
      text-align: left;
      transition: transform .22s var(--ease), background .18s ease;
    }

    .tool-card:hover {
      transform: translateY(-2px);
      background: #d9f2e3;
    }

    .tool-card-title {
      font-size: 16px;
      font-weight: 500;
    }

    .tool-card-desc {
      margin-top: 10px;
      color: #5d8e74;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ---- Stage map ---- */
    .map-canvas {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 62px minmax(0, 1fr) 62px minmax(0, 1fr) 62px minmax(0, 1fr);
      align-items: center;
      min-height: 366px;
      margin-top: 18px;
    }

    .stage {
      position: relative;
      width: 100%;
      min-height: 290px;
      padding: 27px 24px;
      border-radius: 8px;
      background: var(--white);
      color: inherit;
      cursor: pointer;
      transition: transform .24s var(--ease), background .2s ease;
    }

    .stage:hover { transform: translateY(-3px); }

    .stage[data-selected="true"] .stage-title { color: var(--green-dark); }

    .stage-main {
      width: 100%;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
    }

    .stage-title {
      display: block;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 500;
      transition: color .18s ease;
    }

    .stage-intro {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .stage-groups {
      display: grid;
      gap: 12px;
      margin-top: 25px;
    }

    .stage-group {
      width: 100%;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      border: 0;
      border-radius: 4px;
      background: var(--tile);
      color: #484f55;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: background .18s ease, color .18s ease;
    }

    .stage-group[aria-selected="true"] {
      background: var(--green-soft);
      color: #168b4d;
    }

    .stage-group[aria-selected="true"] i { color: var(--green-dark); }

    .stage-group i {
      color: #a5abb0;
      font-style: normal;
      font-size: 18px;
    }

    .connector {
      position: relative;
      z-index: 2;
      width: 62px;
      height: 34px;
      margin: 0 -2px;
      overflow: visible;
    }

    /* ---- Detail section ---- */
    .detail-section {
      scroll-margin-top: 24px;
      margin-top: 4px;
    }

    .detail-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 30px;
      padding-top: 30px;
    }

    .detail-heading h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 500;
    }

    .detail-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .detail-action-note {
      padding-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .framework-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .framework-tab {
      min-width: 124px;
      height: 42px;
      padding: 0 22px;
      border: 1px solid #e5e7e9;
      border-radius: 22px;
      background: var(--white);
      color: #50575e;
      cursor: pointer;
      font-size: 14px;
      transition: background .18s ease, border-color .18s ease, color .18s ease;
    }

    .framework-tab:hover { border-color: #cfd4d8; }

    .framework-tab[aria-selected="true"] {
      border-color: #eef0f1;
      background: #eef0f1;
      color: var(--text);
      font-weight: 600;
    }

    .framework-hint {
      margin: 24px 2px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-content { animation: content-in .3s var(--ease) both; }

    /* ---- Ability cards (4-column) ---- */
    .ability-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .single-view-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .single-item {
      display: flex;
      flex-direction: column;
    }

    .single-item .framework-hint {
      margin: 0 2px 12px;
    }

    .single-item .ability-card {
      flex: 1;
    }

    .ability-card {
      min-height: 192px;
      display: flex;
      flex-direction: column;
      padding: 26px 28px 22px;
      border-radius: 8px;
      background: var(--white);
      transition: transform .2s var(--ease);
    }

    .ability-card:hover { transform: translateY(-2px); }

    .ability-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .ability-name {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .badge.required { background: #E54545; color: #fff; }
    .badge.recommended { background: #FA8C16; color: #fff; }

    .ability-detail {
      height: 34px;
      padding: 0 20px;
      border: 0;
      border-radius: 4px;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: background .18s ease, transform .18s var(--ease);
    }

    .ability-detail:hover { background: var(--green-dark); }
    .ability-detail:active { transform: scale(0.97); }

    .ability-description {
      margin: 15px 0 0;
      color: #767e85;
      font-size: 14px;
      line-height: 1.75;
    }

    .subitems,
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .subitems span,
    .tags span {
      padding: 5px 8px;
      border-radius: 2px;
      background: var(--tag);
      color: #7b838a;
      font-size: 12px;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: 1px solid var(--green-soft);
      border-radius: 14px;
      background: var(--white);
      color: var(--green-dark);
      font-size: 12px;
    }

    .category-tag::before {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--green);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 18px;
      color: #a0a6ab;
      font-size: 12px;
    }

    .source { display: flex; align-items: center; gap: 7px; }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b6bcc1;
    }

    .source-dot.internal { background: var(--green); }
    .source-dot.document { background: #6b91cc; }
    .source-dot.tencent { background: #e9a140; }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 34px;
      padding: 12px 18px;
      border-radius: 6px;
      background: rgba(45, 49, 54, .92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity .2s ease, transform .25s var(--ease);
    }

    .toast.visible { opacity: 1; transform: translate(-50%, 0); }

    button:focus-visible {
      outline: 2px solid rgba(0, 184, 108, .35);
      outline-offset: 3px;
    }

    @keyframes content-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Responsive ---- */
    @media (max-width: 1180px) {
      .page { width: calc(100vw - 48px); }
      .tool-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .map-canvas { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .connector { display: none; }
      .ability-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .single-view-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page { width: calc(100vw - 28px); padding-top: 24px; }
      .tool-cards { grid-template-columns: 1fr; }
      .map-canvas, .ability-grid, .single-view-grid { grid-template-columns: 1fr; }
      .section-heading, .detail-heading { align-items: flex-start; flex-direction: column; gap: 8px; }
      .stage { min-height: 250px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- Header -->
    <header>
      <h1>新游专区</h1>
      <p class="subtitle">助力 IAA 新游一站式成长</p>
    </header>

    <button class="notice placeholder-trigger" type="button" data-label="最新活动">
      最新活动：社交增长能力已上线<span class="notice-link">前往查看 &gt;</span>
    </button>

    <!-- ==================== 板块一：测试调优工具 ==================== -->
    <div class="section-heading">
      <div>
        <h2>测试调优工具</h2>
        <p>上线前完成数据接入与商业化能力验证，持续优化游戏表现</p>
      </div>
    </div>

    <section class="tool-cards" aria-label="测试调优工具">
      <button class="tool-card placeholder-trigger" type="button" data-label="小游戏数据分析接口接入指南">
        <span class="tool-card-title">数据分析接入</span>
        <span class="tool-card-desc">接入小游戏数据分析接口，获取用户行为与收入等核心指标数据</span>
      </button>
      <button class="tool-card placeholder-trigger" type="button" data-label="商业化工具箱">
        <span class="tool-card-title">商业化工具箱</span>
        <span class="tool-card-desc">一站式管理广告位、变现策略与商业化配置</span>
      </button>
      <button class="tool-card placeholder-trigger" type="button" data-label="收入诊断工具">
        <span class="tool-card-title">收入诊断</span>
        <span class="tool-card-desc">定位收入异常原因，提供优化建议与数据归因分析</span>
      </button>
      <button class="tool-card placeholder-trigger" type="button" data-label="实验工具">
        <span class="tool-card-title">实验工具</span>
        <span class="tool-card-desc">支持 A/B 测试与分流实验，科学验证产品优化方向</span>
      </button>
    </section>

    <!-- ==================== 板块二：新游成长地图 ==================== -->
    <div class="section-heading">
      <div>
        <h2>新游成长地图</h2>
        <p>按当前阶段查看适合接入的能力与运营资源</p>
      </div>
      <div class="section-hint">选择阶段查看详情</div>
    </div>

    <section class="map-canvas" role="tablist" aria-label="新游成长阶段">
      <!-- 阶段 1 -->
      <article class="stage" data-stage="planning" data-selected="true">
        <button class="stage-main" type="button" role="tab" aria-selected="true" data-stage="planning">
          <span class="stage-title">规划立项期</span>
          <span class="stage-intro">寻找方向，判断市场机会</span>
        </button>
        <div class="stage-groups">
          <button class="stage-group" type="button" data-stage="planning" data-group-index="0" aria-selected="true">创意与趋势<i>&rsaquo;</i></button>
          <button class="stage-group" type="button" data-stage="planning" data-group-index="1" aria-selected="false">历史案例<i>&rsaquo;</i></button>
        </div>
      </article>

      <svg class="connector" viewBox="0 0 62 34" aria-hidden="true">
        <defs><linearGradient id="c1"><stop offset="0" stop-color="#c8f0dd"/><stop offset="1" stop-color="#00B86C"/></linearGradient></defs>
        <circle cx="7" cy="17" r="3" fill="#a8e6c5"/>
        <path d="M7 17H45" stroke="url(#c1)" stroke-width="2" stroke-linecap="round"/>
        <path d="M41 7.5C47 11.5 52.5 14.5 59 17c-6.5 2.5-12 5.5-18 9.5 3-4.2 4.2-7 4.2-9.5S44 11.7 41 7.5Z" fill="#00B86C"/>
      </svg>

      <!-- 阶段 2 -->
      <article class="stage" data-stage="development" data-selected="false">
        <button class="stage-main" type="button" role="tab" aria-selected="false" data-stage="development">
          <span class="stage-title">开发接入期</span>
          <span class="stage-intro">完成上线前的能力建设</span>
        </button>
        <div class="stage-groups">
          <button class="stage-group" type="button" data-stage="development" data-group-index="0" aria-selected="false">基础能力<i>&rsaquo;</i></button>
          <button class="stage-group" type="button" data-stage="development" data-group-index="1" aria-selected="false">进阶能力<i>&rsaquo;</i></button>
        </div>
      </article>

      <svg class="connector" viewBox="0 0 62 34" aria-hidden="true">
        <defs><linearGradient id="c2"><stop offset="0" stop-color="#c8f0dd"/><stop offset="1" stop-color="#00B86C"/></linearGradient></defs>
        <circle cx="7" cy="17" r="3" fill="#a8e6c5"/>
        <path d="M7 17H45" stroke="url(#c2)" stroke-width="2" stroke-linecap="round"/>
        <path d="M41 7.5C47 11.5 52.5 14.5 59 17c-6.5 2.5-12 5.5-18 9.5 3-4.2 4.2-7 4.2-9.5S44 11.7 41 7.5Z" fill="#00B86C"/>
      </svg>

      <!-- 阶段 3 -->
      <article class="stage" data-stage="launch" data-selected="false">
        <button class="stage-main" type="button" role="tab" aria-selected="false" data-stage="launch">
          <span class="stage-title">发布启动期</span>
          <span class="stage-intro">获取首批用户并准备素材</span>
        </button>
        <div class="stage-groups">
          <button class="stage-group" type="button" data-stage="launch" data-group-index="0" aria-selected="false">流量获取<i>&rsaquo;</i></button>
          <button class="stage-group" type="button" data-stage="launch" data-group-index="1" aria-selected="false">运营素材<i>&rsaquo;</i></button>
        </div>
      </article>

      <svg class="connector" viewBox="0 0 62 34" aria-hidden="true">
        <defs><linearGradient id="c3"><stop offset="0" stop-color="#c8f0dd"/><stop offset="1" stop-color="#00B86C"/></linearGradient></defs>
        <circle cx="7" cy="17" r="3" fill="#a8e6c5"/>
        <path d="M7 17H45" stroke="url(#c3)" stroke-width="2" stroke-linecap="round"/>
        <path d="M41 7.5C47 11.5 52.5 14.5 59 17c-6.5 2.5-12 5.5-18 9.5 3-4.2 4.2-7 4.2-9.5S44 11.7 41 7.5Z" fill="#00B86C"/>
      </svg>

      <!-- 阶段 4 -->
      <article class="stage" data-stage="growth" data-selected="false">
        <button class="stage-main" type="button" role="tab" aria-selected="false" data-stage="growth">
          <span class="stage-title">成长放大期</span>
          <span class="stage-intro">扩大流量与商业化规模</span>
        </button>
        <div class="stage-groups">
          <button class="stage-group" type="button" data-stage="growth" data-group-index="0" aria-selected="false">基础能力<i>&rsaquo;</i></button>
          <button class="stage-group" type="button" data-stage="growth" data-group-index="1" aria-selected="false">进阶能力<i>&rsaquo;</i></button>
        </div>
      </article>
    </section>

    <!-- ==================== 板块三：阶段详情 ==================== -->
    <section class="detail-section" id="stage-detail" role="tabpanel" aria-live="polite">
      <div class="detail-heading">
        <div>
          <h2 id="detail-title"></h2>
          <p id="detail-description"></p>
          <div class="framework-tabs" id="framework-tabs" role="tablist" aria-label="阶段框架"></div>
        </div>
        <div class="detail-action-note">能力入口均为原型演示</div>
      </div>
      <div class="detail-content" id="detail-content"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span id="toast-label">该入口</span>：原型演示，待接正式入口
  </div>

  <script>
    /* ---- Data ---- */
    const stages = {
      planning: {
        title: "规划立项期",
        description: "借助生态热点和历史案例完成选品、题材判断与创意验证。",
        singleView: true,
        groups: [
          { title: "创意与趋势", hint: "通过生态热点判断市场机会", items: [
            { name: "创意工具", description: "查看微信生态热门游戏、热搜与热词，发现用户关注方向和潜在赛道。", source: "MP 后台看板", type: "internal", tags: ["创意", "趋势"] }
          ]},
          { title: "历史案例", hint: "通过已有实践降低立项试错成本", items: [
            { name: "历史案例参考", description: "参考优质 IAA 游戏案例、典型增长路径与关键经验，降低立项试错成本。", source: "官方文档", type: "document", tags: ["案例", "立项"] }
          ]}
        ]
      },
      development: {
        title: "开发接入期",
        description: "先完成影响发布与变现的基础接入，再根据玩法和运营需求补充进阶能力。",
        groups: [
          { title: "基础能力", hint: "建议上线前优先完成", items: [
            { name: "流量主", required: true, description: "开通流量主并完成广告位规划、创建和接入，为上线后的广告变现做好准备。", source: "MP 内部能力 / 官方文档", type: "internal", tags: ["商业化", "广告位"] },
            { name: "PC 拓展屏", recommended: true, description: "拓展小游戏在 PC 场景下的展示和操作体验。", source: "MP 内部能力", type: "internal", tags: ["体验", "PC 场景"] },
            { name: "转发分享", recommended: true, description: "建立游戏分享链路，支持内容传播、好友互动与自然拉新。", source: "MP 内部能力 / 官方文档", type: "internal", tags: ["社交", "分享"] }
          ]},
          { title: "进阶能力", hint: "结合玩法和用户运营需求接入", items: [
            { name: "一次性订阅消息", description: "在合规前提下触达用户，支持关键状态提醒和用户召回。", source: "MP 内部能力", type: "internal", tags: ["触达", "召回"] },
            { name: "评价与推荐", description: "完善评价相关能力，积累用户口碑并提升游戏推荐效率。", source: "MP 内部能力", type: "internal", tags: ["评价", "推荐"] }
          ]}
        ]
      },
      launch: {
        title: "发布启动期",
        description: "集中获取首批用户并准备运营素材，帮助游戏进入稳定的早期运营。",
        groups: [
          { title: "流量获取", hint: "争取首批曝光与用户", items: [
            { name: "广告开通与配置", required: true, description: "完成广告账户、投放能力及基础广告配置，为后续放量做好准备。", source: "官方文档", type: "document", tags: ["广告", "配置"] },
            { name: "CPS 合作", recommended: true, description: "通过视频号短视频或直播任务，以效果结算方式拓展内容渠道流量。", source: "MP 内部能力", type: "internal", tags: ["视频号", "CPS"] },
            { name: "新游种子", description: "为符合条件的新游提供冷启动流量支持。", source: "MP 内部能力", type: "internal", tags: ["冷启动", "流量"] },
            { name: "增长种子", description: "面向具备增长潜力的游戏提供进一步的流量支持。", source: "MP 内部能力", type: "internal", tags: ["增长", "流量"] }
          ]},
          { title: "运营素材", hint: "降低早期内容生产和配置成本", items: [
            { name: "配置素材", required: true, description: "查看游戏发布及运营场景所需的素材规范、模板和配置指引。", source: "MP 内部能力", type: "internal", tags: ["规范", "模板"] },
            { name: "热点素材库", description: "获取与当前热点相关的内容素材和创意参考。", source: "MP 内部能力", type: "internal", tags: ["热点", "素材"] }
          ]}
        ]
      },
      growth: {
        title: "成长放大期",
        description: "以稳定运营为基础，引入社交、内容和商业化能力，持续放大增长成果。",
        groups: [
          { title: "基础能力", hint: "构建日常运营和持续投放的基本盘", items: [
            { name: "广告投放", required: true, description: "结合游戏阶段、目标与预算选择投放策略和广告形态。", source: "腾讯文档 / MP 能力", type: "tencent", tags: ["投放", "广告"], categories: ["广告策略", "广告形态", "投放方式"] },
            { name: "视频号", recommended: true, description: "通过短视频和直播场景拓展内容渠道增量。", source: "官方文档 / MP 能力", type: "document", tags: ["内容", "增长"] },
            { name: "用户反馈", recommended: true, description: "及时查看和收集用户意见，持续优化产品体验。", source: "MP 内部能力", type: "internal", tags: ["反馈", "体验"] },
            { name: "排行榜", description: "构建用户竞争和持续参与机制，提升游戏活跃度。", source: "MP 内部能力", type: "internal", tags: ["活跃", "竞争"] }
          ]},
          { title: "进阶能力", hint: "通过社交和内容渠道进一步放大增长", items: [
            { name: "广告卡", recommended: true, description: "使用广告卡新能力拓展商业化变现方式。", source: "MP 内部能力", type: "internal", tags: ["商业化", "变现"] },
            { name: "红包", description: "通过激励机制促进用户参与、分享及召回。", source: "MP 内部能力", type: "internal", tags: ["社交", "激励"] },
            { name: "擂台赛", description: "通过竞技玩法丰富内容运营形式，增强持续参与。", source: "MP 内部能力", type: "internal", tags: ["竞技", "运营"] },
            { name: "游戏圈", description: "沉淀游戏内容与玩家互动，承接社区运营场景。", source: "MP 内部能力", type: "internal", tags: ["社区", "互动"] }
          ]}
        ]
      }
    };

    /* ---- DOM refs ---- */
    const detailTitle = document.getElementById("detail-title");
    const detailDescription = document.getElementById("detail-description");
    const frameworkTabs = document.getElementById("framework-tabs");
    const detailContent = document.getElementById("detail-content");
    const detailSection = document.getElementById("stage-detail");
    const toast = document.getElementById("toast");
    const toastLabel = document.getElementById("toast-label");
    let toastTimer;

    function escapeHtml(v) {
      return String(v).replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#039;", '"': "&quot;" })[c]);
    }

    function sortItems(items) {
      return [...items].sort((a, b) => {
        const aRank = a.required ? 0 : a.recommended ? 1 : 2;
        const bRank = b.required ? 0 : b.recommended ? 1 : 2;
        return aRank - bRank;
      });
    }

    function renderBadge(item) {
      if (item.required) return `<span class="badge required">必接</span>`;
      if (item.recommended) return `<span class="badge recommended">推荐</span>`;
      return "";
    }

    function renderAbilityCard(item) {
      return `
        <article class="ability-card" data-ability="${escapeHtml(item.name)}">
          <div class="ability-top">
            <h4 class="ability-name">${escapeHtml(item.name)} ${renderBadge(item)}</h4>
            <button class="ability-detail placeholder-trigger" type="button" data-label="${escapeHtml(item.name)}">详情</button>
          </div>
          <p class="ability-description">${escapeHtml(item.description)}</p>
          ${item.categories ? `<div class="categories">${item.categories.map(v => `<span class="category-tag">${escapeHtml(v)}</span>`).join("")}</div>` : ""}
          ${item.subitems ? `<div class="subitems">${item.subitems.map(v => `<span>${escapeHtml(v)}</span>`).join("")}</div>` : ""}
          <div class="card-footer">
            <div class="tags">${item.tags.map(v => `<span>${escapeHtml(v)}</span>`).join("")}</div>
            <div class="source"><span class="source-dot ${escapeHtml(item.type)}"></span>${escapeHtml(item.source)}</div>
          </div>
        </article>
      `;
    }

    let selectedStage = "planning";
    let selectedGroup = 0;

    function renderSelection(key, groupIndex, scrollToDetail) {
      const stage = stages[key];
      const safeGroupIndex = Math.min(Math.max(groupIndex, 0), stage.groups.length - 1);
      const group = stage.groups[safeGroupIndex];
      selectedStage = key;
      selectedGroup = safeGroupIndex;

      document.querySelectorAll(".stage").forEach(card => {
        card.dataset.selected = String(card.dataset.stage === key);
      });
      document.querySelectorAll(".stage-main").forEach(btn => {
        btn.setAttribute("aria-selected", String(btn.dataset.stage === key));
      });
      document.querySelectorAll(".stage-group").forEach(btn => {
        const sel = btn.dataset.stage === key && Number(btn.dataset.groupIndex) === safeGroupIndex;
        btn.setAttribute("aria-selected", String(sel));
      });

      detailTitle.textContent = stage.title;
      detailDescription.textContent = stage.description;

      const singleView = !!stage.singleView;

      if (singleView) {
        frameworkTabs.innerHTML = "";
        detailContent.style.animation = "none";
        detailContent.offsetHeight;
        detailContent.innerHTML = `
          <div class="single-view-grid">
            ${stage.groups.flatMap(g =>
              sortItems(g.items).map(item => `
                <div class="single-item">
                  <p class="framework-hint">${escapeHtml(g.hint)}</p>
                  ${renderAbilityCard(item)}
                </div>
              `)
            ).join("")}
          </div>
        `;
      } else {
        frameworkTabs.innerHTML = stage.groups.map((tab, idx) =>
          `<button class="framework-tab" type="button" role="tab" aria-selected="${idx === safeGroupIndex}" data-group-index="${idx}">${escapeHtml(tab.title)}</button>`
        ).join("");

        frameworkTabs.querySelectorAll(".framework-tab").forEach(btn => {
          btn.addEventListener("click", () => renderSelection(key, Number(btn.dataset.groupIndex), false));
        });

        detailContent.style.animation = "none";
        detailContent.offsetHeight;
        detailContent.innerHTML = `
          <p class="framework-hint">${escapeHtml(group.hint)}</p>
          <div class="ability-grid">
            ${sortItems(group.items).map(renderAbilityCard).join("")}
          </div>
        `;
      }

      detailContent.style.animation = "content-in .3s var(--ease) both";
      bindPlaceholders(detailContent);
      if (scrollToDetail) detailSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function showToast(label) {
      toastLabel.textContent = label || "该入口";
      toast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("visible"), 2100);
    }

    function bindPlaceholders(root) {
      root = root || document;
      root.querySelectorAll(".placeholder-trigger").forEach(btn => {
        if (btn.dataset.bound) return;
        btn.dataset.bound = "true";
        btn.addEventListener("click", () => showToast(btn.dataset.label));
      });
    }

    document.querySelectorAll(".stage-main").forEach(btn => {
      btn.addEventListener("click", () => renderSelection(btn.dataset.stage, 0, true));
    });
    document.querySelectorAll(".stage").forEach(card => {
      card.addEventListener("click", e => {
        if (e.target.closest("button")) return;
        renderSelection(card.dataset.stage, 0, true);
      });
    });
    document.querySelectorAll(".stage-group").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        renderSelection(btn.dataset.stage, Number(btn.dataset.groupIndex), true);
      });
    });

    bindPlaceholders();
    renderSelection("planning", 0, false);
  </script>
</body>
</html>
