<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IAA 新游专区</title>
  <style>
    :root {
      --green: #00B86C;
      --green-dark: #019456;
      --green-soft: #E6F8EF;
      --text: #25282d;
      --secondary: #626a72;
      --muted: #92999f;
      --canvas: #f5f7f8;
      --white: #fff;
      --tile: #f7f8f8;
      --tag: #f3f4f5;
      --border: #e8eaed;
      --blue: #667c9f;
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button { font: inherit; cursor: pointer; }

    .page {
      width: min(1460px, calc(100vw - 80px));
      margin: 0 auto;
      padding: 36px 0 72px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.4;
      font-weight: 500;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .notice {
      width: 100%;
      margin-top: 22px;
      padding: 11px 16px;
      border: 0;
      border-radius: 4px;
      background: #fff7d6;
      color: #5e5539;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
    }

    .notice-link { margin-left: 8px; color: var(--blue); }

    /* ======== Section heading (shared by tools and map) ======== */
    .section-heading {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 30px;
      margin-top: 32px;
      padding: 0 2px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 500;
    }

    .section-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .section-aside {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .section-hint { color: var(--muted); font-size: 13px; }

    /* ======== Tool section — compact MP-style utility strip ======== */
    .tool-panel {
      width: 100%;
      margin: 16px 0 0;
      padding: 14px;
      border: 0;
      border-radius: 8px;
      background: var(--white);
    }

    .tool-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 82px;
      padding: 13px 18px;
      border: 0;
      border-radius: 4px;
      background: var(--tile);
      color: #525960;
      text-align: center;
      cursor: pointer;
      transition: color .18s ease, background .18s ease;
    }

    .tool-item:hover { color: var(--green-dark); background: var(--green-soft); }

    .tool-name {
      font-size: 14px;
      font-weight: 500;
      margin: 0;
      color: inherit;
    }

    .tool-desc {
      display: block;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .tool-icon, .tool-action { display: none; }

    /* ======== Stage map ======== */
    .journey-rail {
      position: relative;
      height: 76px;
      margin-top: 16px;
      padding: 0;
    }

    .journey-track,
    .journey-progress {
      position: absolute;
      left: 12.5%;
      top: 52px;
      height: 2px;
      border-radius: 2px;
    }

    .journey-track {
      right: 12.5%;
      background: #dfe4e1;
    }

    .journey-track::after { display: none; }

    .journey-progress {
      width: var(--progress-width, 0%);
      background: linear-gradient(90deg, #81ddb0, var(--green));
      transition: width .35s var(--ease);
    }

    .journey-nodes {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .journey-node {
      position: relative;
      height: 76px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .journey-node::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 47px;
      width: 12px;
      height: 12px;
      border: 3px solid var(--canvas);
      border-radius: 50%;
      background: #cbd1d5;
      transform: translateX(-50%);
      transition: width .22s var(--ease), height .22s var(--ease), top .22s var(--ease), background .18s ease, box-shadow .18s ease;
    }

    .journey-node[data-state="complete"]::after { background: var(--green); }

    .journey-node[data-state="current"]::after {
      top: 43px;
      width: 20px;
      height: 20px;
      background: var(--green);
      box-shadow: inset 0 0 0 4px #fff, 0 0 0 3px rgba(0, 184, 108, .12);
    }

    .journey-node:not(:last-child)::before {
      content: "";
      position: absolute;
      z-index: 3;
      right: -4px;
      top: 48px;
      width: 9px;
      height: 10px;
      border: 0;
      background: #a8dcbc;
      clip-path: polygon(0 0, 100% 50%, 0 100%, 34% 50%);
      transform: none;
    }

    .journey-node[data-state="complete"]::before { background: #55cb91; }

    .journey-status {
      position: absolute;
      z-index: 4;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 15px;
      border-radius: 4px;
      background: var(--green);
      color: #fff;
      box-shadow: 0 5px 12px rgba(0, 184, 108, .13);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      white-space: nowrap;
      transform: translateX(-50%);
      transition: left .35s var(--ease), transform .22s var(--ease);
      animation: stage-marker-in .38s var(--ease) both;
    }

    .journey-status::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 0;
      height: 0;
      border-right: 7px solid transparent;
      border-left: 7px solid transparent;
      border-top: 8px solid var(--green);
      transform: translateX(-50%);
    }

    @keyframes stage-marker-in {
      from { opacity: 0; transform: translate(-50%, -6px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    .map-canvas {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 44px;
      align-items: start;
      min-height: 112px;
      margin-top: 0;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 112px;
      min-height: 112px;
      display: flex;
      align-items: center;
      padding: 18px 24px;
      border-radius: 8px;
      background: var(--white);
      color: inherit;
      cursor: pointer;
      transition: transform .24s var(--ease), background .2s ease;
    }

    .stage:hover { transform: translateY(-3px); }

    .stage[data-selected="true"] { box-shadow: inset 0 3px 0 var(--green), inset 0 -3px 0 var(--green); }

    .stage:not([data-stage="growth"])::before {
      content: "";
      position: absolute;
      z-index: 3;
      right: -35px;
      top: calc(50% - 13px);
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--green-soft);
    }

    .stage:not([data-stage="growth"])::after {
      content: "›";
      position: absolute;
      z-index: 3;
      right: -28px;
      top: calc(50% - 13px);
      width: 13px;
      height: 26px;
      border: 0;
      color: var(--green-dark);
      font-size: 20px;
      line-height: 24px;
      text-align: center;
    }

    .stage[data-selected="true"] .stage-title { color: var(--green-dark); }

    .stage-main {
      width: 100%;
      display: block;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
    }

    .stage-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stage-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--green-soft);
      color: var(--green);
    }

    .stage-title {
      display: block;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 500;
      transition: color .18s ease;
    }

    .stage-intro {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .stage-groups {
      display: none;
    }

    .stage-group {
      position: relative;
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      border: 0;
      border-radius: 4px;
      background: var(--tile);
      color: #484f55;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: background .18s ease, color .18s ease;
    }

    .stage-group[aria-selected="true"] {
      background: var(--green-soft);
      color: #168b4d;
    }

    .stage-group[aria-selected="true"] i { color: var(--green-dark); }

    .stage-group[aria-selected="true"] i { transform: rotate(90deg); }

    .stage-group i {
      color: #a5abb0;
      font-style: normal;
      font-size: 18px;
      transition: color .18s ease, transform .22s var(--ease);
    }

    .tab-update-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f04b4b;
      flex: 0 0 auto;
    }

    .stage-group > .tab-update-dot {
      position: absolute;
      right: 38px;
      top: 50%;
      transform: translateY(-50%);
    }

    .stage-inline-detail {
      display: none !important;
      gap: 8px;
      max-height: 0;
      margin-top: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: max-height .38s var(--ease), opacity .22s ease, transform .32s var(--ease), margin-top .32s var(--ease);
    }

    .stage-inline-detail[data-open="true"] {
      max-height: 2000px;
      margin-top: 4px;
      overflow: visible;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .inline-ability {
      width: 100%;
      padding: 13px 14px;
      border: 0;
      border-radius: 4px;
      background: #fbfcfc;
      color: inherit;
      text-align: left;
      transition: background .18s ease;
    }

    .inline-ability:hover { background: var(--green-soft); }

    .inline-ability-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .inline-ability-name {
      font-size: 13px;
      font-weight: 600;
      color: #3f464c;
    }

    .inline-ability-arrow { color: #a5abb0; font-size: 16px; }

    .inline-ability-desc {
      display: -webkit-box;
      margin: 5px 0 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .inline-ability-source {
      display: block;
      margin-top: 7px;
      color: #a2a8ad;
      font-size: 11px;
    }

    .inline-ability-statuses { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
    .status-connected { padding: 3px 7px; border-radius: 2px; background: var(--green-soft); color: var(--green-dark); font-size: 10px; font-weight: 500; }
    .status-new { padding: 3px 6px; border-radius: 2px; background: #f04b4b; color: #fff; font-size: 10px; font-weight: 600; }
    .update-note { display: block; margin-top: 8px; padding: 7px 9px; border-radius: 3px; background: #fff7d6; color: #8a7540; font-size: 11px; line-height: 1.5; }
    .stage-update-dot { display: inline-block; width: 7px; height: 7px; margin-left: 7px; border-radius: 50%; background: #f04b4b; vertical-align: 3px; }

    .data-tool-groups { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .data-tool-group { padding: 18px; border-radius: 6px; background: var(--tile); }
    .data-tool-group-title { margin: 0; color: #3f464c; font-size: 15px; font-weight: 600; }
    .data-tool-group-desc { margin: 6px 0 14px; color: var(--muted); font-size: 12px; }
    .data-tool-list { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .data-tool-item { min-height: 92px; padding: 14px; border: 0; border-radius: 4px; background: var(--white); color: inherit; text-align: left; transition: background .18s ease, transform .2s var(--ease); }
    .data-tool-item:hover { background: var(--green-soft); transform: translateY(-2px); }
    .data-tool-name { display: flex; align-items: center; gap: 7px; color: #424950; font-size: 13px; font-weight: 600; }
    .data-tool-desc { display: block; margin-top: 7px; color: var(--muted); font-size: 11px; line-height: 1.55; }
    .platform-tag { padding: 2px 5px; border-radius: 2px; background: #eef0f1; color: #7f878d; font-size: 9px; font-weight: 500; }
    @media (max-width: 1000px) { .data-tool-groups { grid-template-columns: 1fr; } }
    @media (max-width: 760px) { .data-tool-list { grid-template-columns: 1fr; } }

    .connector { display: none; }

    /* ======== Detail section ======== */
    .detail-section {
      --active-index: 0;
      position: relative;
      display: grid;
      grid-template-rows: 0fr;
      scroll-margin-top: 24px;
      margin-top: 0;
      overflow: visible;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: grid-template-rows .34s var(--ease), margin-top .34s var(--ease), opacity .2s ease, transform .34s var(--ease);
    }

    .detail-section[data-visible="true"] {
      grid-template-rows: 1fr;
      margin-top: 22px;
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .detail-inner {
      min-height: 0;
      overflow: hidden;
      border-radius: 8px;
      background: var(--white);
      box-shadow: inset 0 3px 0 var(--green);
    }
    .detail-section[data-visible="true"]::before {
      content: "";
      position: absolute;
      top: -22px;
      left: calc((var(--active-index) * 25%) + 12.5%);
      width: 2px; height: 14px;
      border-radius: 2px;
      background: var(--green);
      transform: translateX(-50%);
      transition: left .35s var(--ease);
    }
    .detail-section[data-visible="true"]::after {
      content: "";
      position: absolute;
      left: calc((var(--active-index) * 25%) + 12.5%);
      top: -9px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      transform: translateX(-50%);
      transition: left .35s var(--ease);
    }

    .detail-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 30px;
      padding: 26px 28px 0;
    }

    .detail-heading h2 {
      display: none;
    }

    .detail-heading p {
      display: none;
    }

    .detail-action-note {
      padding-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .framework-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 0;
    }

    .framework-tab {
      min-width: 124px;
      height: 42px;
      padding: 0 22px;
      border: 1px solid #e5e7e9;
      border-radius: 22px;
      background: var(--white);
      color: #50575e;
      cursor: pointer;
      font-size: 14px;
      transition: background .18s ease, border-color .18s ease, color .18s ease;
    }

    .framework-tab:hover { border-color: #cfd4d8; }

    .framework-tab[aria-selected="true"] {
      border-color: #eef0f1;
      background: #eef0f1;
      color: var(--text);
      font-weight: 600;
    }

    .framework-hint {
      margin: 24px 2px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-content { animation: content-in .3s var(--ease) both; }
    .detail-content { padding: 0 28px 26px; }
    .detail-section .framework-tabs { display: flex; }
    .detail-section .framework-tab {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 112px;
      height: 38px;
      border: 0;
      background: var(--tile);
      color: #626a72;
    }
    .detail-section .framework-tab[aria-selected="true"] {
      border: 0;
      background: var(--green-soft);
      color: var(--green-dark);
    }
    .detail-section .ability-card { background: var(--tile); }

    .ability-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .single-view-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .single-item {
      display: flex;
      flex-direction: column;
    }

    .single-item .framework-hint {
      margin: 0 2px 12px;
    }

    .single-item .ability-card {
      flex: 1;
    }

    .ability-card {
      height: 100%;
      min-height: 214px;
      display: flex;
      flex-direction: column;
      padding: 18px 22px 17px;
      border-radius: 8px;
      background: var(--white);
      transition: transform .2s var(--ease);
    }

    .ability-card:hover { transform: translateY(-2px); }

    .ability-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .ability-actions { display: flex; align-items: center; gap: 8px; }

    .ability-name {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }


    .ability-detail {
      height: 34px;
      padding: 0 20px;
      border: 0;
      border-radius: 4px;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: background .18s ease, transform .18s var(--ease);
    }

    .ability-detail:hover { background: var(--green-dark); }
    .ability-detail:active { transform: scale(0.97); }

    .ability-description {
      display: -webkit-box;
      min-height: 44px;
      margin: 12px 0 0;
      overflow: hidden;
      color: #767e85;
      font-size: 14px;
      line-height: 1.75;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .ability-update-slot:not(:empty) { margin-top: 7px; }
    .ability-update-slot:empty { display: none; }
    .ability-update-slot .update-note { margin-top: 0; }

    .subitems,
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .subitems span,
    .tags span {
      padding: 5px 8px;
      border-radius: 2px;
      background: var(--tag);
      color: #7b838a;
      font-size: 12px;
    }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border: 1px solid var(--green-soft);
      border-radius: 14px;
      background: var(--white);
      color: var(--green-dark);
      font-size: 12px;
    }

    .category-tag::before {
      content: "";
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--green);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 18px;
      color: #a0a6ab;
      font-size: 12px;
    }

    .source { display: flex; align-items: center; gap: 7px; }

    .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b6bcc1;
    }

    .source-dot.internal { background: var(--green); }
    .source-dot.document { background: #6b91cc; }
    .source-dot.tencent { background: #e9a140; }

    .toast {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 34px;
      padding: 12px 18px;
      border-radius: 6px;
      background: rgba(45, 49, 54, .92);
      color: #fff;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity .2s ease, transform .25s var(--ease);
    }

    .toast.visible { opacity: 1; transform: translate(-50%, 0); }

    button:focus-visible {
      outline: 2px solid rgba(0, 184, 108, .35);
      outline-offset: 3px;
    }

    @keyframes content-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes inline-open {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ======== Responsive ======== */
    @media (max-width: 1180px) {
      .page { width: calc(100vw - 48px); }
      .tool-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .map-canvas { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .journey-rail { display: none; }
      .connector { display: none; }

      "广告投放": { url: "./iaa-ad-delivery-scene.html", target: "_self" },
      "视频号": { url: "./iaa-video-account-detail-commercial-plan.html", target: "_self" },
      "用户反馈": { url: "", target: "_self" },
      "排行榜": { url: "", target: "_self" },
      "广告卡": { url: "", target: "_self" },
      "红包": { url: "", target: "_self" },
      "擂台赛": { url: "", target: "_self" },
      "游戏圈": { url: "", target: "_self" }
    };

    function syncUpdateIndicators() {
      Object.entries(stages).forEach(([stageKey, stage]) => {
        const hasUpdate = stage.groups.some(group => group.items.some(item => item.isNew));
        if (!hasUpdate) return;
        const title = document.querySelector('.stage[data-stage="' + stageKey + '"] .stage-title');
        if (title && !title.querySelector(".stage-update-dot")) {
          const dot = document.createElement("span");
          dot.className = "stage-update-dot";
          dot.setAttribute("aria-label", "存在新功能");
          title.appendChild(dot);
        }
      });
    }

    const detailTitle = document.getElementById("detail-title");
    const detailDescription = document.getElementById("detail-description");
    const frameworkTabs = document.getElementById("framework-tabs");
    const detailContent = document.getElementById("detail-content");
    const detailSection = document.getElementById("stage-detail");
    const journeyRail = document.getElementById("journey-rail");
    const journeyStatus = document.getElementById("journey-status");
    const toast = document.getElementById("toast");
    const toastLabel = document.getElementById("toast-label");
    let toastTimer;
    let collapseTimer;

    function escapeHtml(v) {
      return String(v).replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#039;", '"': "&quot;" })[c]);
    }

    function sortItems(items) {
      return [...items];
    }

    function renderBadge(item) {
      return "";
    }

    function renderAbilityCard(item) {
      return '<article class="ability-card" data-ability="' + escapeHtml(item.name) + '">'
        + '<div class="ability-top">'
        + '<h4 class="ability-name">' + escapeHtml(item.name) + ' ' + renderBadge(item) + (item.isNew ? '<span class="status-new">NEW</span>' : '') + '</h4>'
        + '<div class="ability-actions">' + (item.connected ? '<span class="status-connected">✓ 已接入</span>' : '')
        + '<button class="ability-detail placeholder-trigger" type="button" data-label="' + escapeHtml(item.name) + '" data-link-name="' + escapeHtml(item.name) + '">详情</button></div>'
        + '</div>'
        + '<p class="ability-description">' + escapeHtml(item.description) + '</p>'
        + '<div class="ability-update-slot">' + (item.update ? '<div class="update-note">更新：' + escapeHtml(item.update) + '</div>' : '') + '</div>'
        + (item.categories ? '<div class="categories">' + item.categories.map(v => '<span class="category-tag">' + escapeHtml(v) + '</span>').join("") + '</div>' : "")
        + (item.subitems ? '<div class="subitems">' + item.subitems.map(v => '<span>' + escapeHtml(v) + '</span>').join("") + '</div>' : "")
        + '<div class="card-footer">'
        + '<div class="tags">' + item.tags.map(v => '<span>' + escapeHtml(v) + '</span>').join("") + '</div>'
        + '<div class="source"><span class="source-dot ' + escapeHtml(item.type) + '"></span>' + escapeHtml(item.source) + '</div>'
        + '</div>'
        + '</article>';
    }

    let selectedStage = null;
    let selectedGroup = -1;

    function selectStageOnly(key, shouldScroll) {
      const stageKeys = Object.keys(stages);
      const activeIndex = stageKeys.indexOf(key);
      selectedStage = key;
      selectedGroup = -1;
      journeyStatus.textContent = "当前阶段 · 发布启动期";
      document.querySelectorAll(".stage").forEach(card => {
        card.dataset.selected = String(card.dataset.stage === key);
      });
      document.querySelectorAll(".stage-main").forEach(btn => {
        btn.setAttribute("aria-selected", String(btn.dataset.stage === key));
      });
      document.querySelectorAll(".stage-group").forEach(btn => {
        btn.setAttribute("aria-selected", "false");
        btn.setAttribute("aria-expanded", "false");
      });
      document.querySelectorAll(".stage-inline-detail").forEach(panel => panel.dataset.open = "false");
      if (shouldScroll) document.querySelector('.stage[data-stage="' + key + '"]').scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function renderInlineAbilities(key, group) {
      document.querySelectorAll(".stage-inline-detail").forEach(panel => {
        if (panel.dataset.inlineStage !== key) {
          panel.dataset.open = "false";
          return;
        }
        const selectedButton = document.querySelector('.stage-group[data-stage="' + key + '"][data-group-index="' + selectedGroup + '"]');
        if (selectedButton) selectedButton.insertAdjacentElement("afterend", panel);
        panel.dataset.open = "false";
        panel.offsetHeight;
        panel.innerHTML = sortItems(group.items).map(item =>
          '<button class="inline-ability placeholder-trigger" type="button" data-label="' + escapeHtml(item.name) + '" data-link-name="' + escapeHtml(item.name) + '">'
          + '<span class="inline-ability-head"><span class="inline-ability-name">' + escapeHtml(item.name) + '</span>'
          + '<span class="inline-ability-statuses">'
          + (item.connected ? '<span class="status-connected">✓ 已接入</span>' : '')
          + (item.isNew ? '<span class="status-new">NEW</span>' : '')
          + '<span class="inline-ability-arrow">&rsaquo;</span></span></span>'
          + '<span class="inline-ability-desc">' + escapeHtml(item.description) + '</span>'
          + (item.update ? '<span class="update-note">更新：' + escapeHtml(item.update) + '</span>' : '')
          + '<span class="inline-ability-source">' + escapeHtml(item.source) + '</span>'
          + '</button>'
        ).join("");
        bindPlaceholders(panel);
        requestAnimationFrame(() => panel.dataset.open = "true");
      });
    }

    function renderSelection(key, groupIndex, scrollToDetail) {
      clearTimeout(collapseTimer);
      const stage = stages[key];
      const safeGroupIndex = Math.min(Math.max(groupIndex, 0), stage.groups.length - 1);
      const group = stage.groups[safeGroupIndex];
      selectedStage = key;
      selectedGroup = safeGroupIndex;

      const stageKeys = Object.keys(stages);
      const activeIndex = stageKeys.indexOf(key);
      detailSection.style.setProperty("--active-index", activeIndex);
      detailSection.dataset.visible = "true";

      document.querySelectorAll(".stage").forEach(card => {
        card.dataset.selected = String(card.dataset.stage === key);
      });
      document.querySelectorAll(".stage-main").forEach(btn => {
        btn.setAttribute("aria-selected", String(btn.dataset.stage === key));
      });
      document.querySelectorAll(".stage-group").forEach(btn => {
        const sel = btn.dataset.stage === key && Number(btn.dataset.groupIndex) === safeGroupIndex;
        btn.setAttribute("aria-selected", String(sel));
        btn.setAttribute("aria-expanded", String(sel));
      });
      detailTitle.textContent = stage.title;
      detailDescription.textContent = stage.description;

      frameworkTabs.innerHTML = stage.groups.map((tab, idx) =>
        '<button class="framework-tab" type="button" role="tab" aria-selected="' + (idx === safeGroupIndex) + '" data-group-index="' + idx + '">' + escapeHtml(tab.title)
        + (tab.items.some(item => item.isNew) ? '<span class="tab-update-dot" aria-label="存在新功能"></span>' : '') + '</button>'
      ).join("");
      frameworkTabs.querySelectorAll(".framework-tab").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const groupIndex = Number(btn.dataset.groupIndex);
          if (selectedStage === key && selectedGroup === groupIndex && detailSection.dataset.visible === "true") {
            collapseDetails();
          } else {
            renderSelection(key, groupIndex, false);
          }
        });
      });
      detailContent.style.animation = "none";
      detailContent.offsetHeight;
      detailContent.innerHTML = '<p class="framework-hint">' + escapeHtml(group.hint) + '</p>'
        + '<div class="ability-grid">'
        + sortItems(group.items).map(renderAbilityCard).join("")
        + '</div>';

      detailContent.style.animation = "content-in .3s var(--ease) both";
      bindPlaceholders(detailContent);
      if (scrollToDetail) detailSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function collapseDetails() {
      selectedStage = null;
      selectedGroup = -1;
      detailSection.dataset.visible = "false";
      document.querySelectorAll(".stage").forEach(card => card.dataset.selected = String(card.dataset.stage === "launch"));
      document.querySelectorAll(".stage-main").forEach(btn => btn.setAttribute("aria-selected", String(btn.dataset.stage === "launch")));
      document.querySelectorAll(".stage-group").forEach(btn => {
        btn.setAttribute("aria-selected", "false");
        btn.setAttribute("aria-expanded", "false");
      });
      clearTimeout(collapseTimer);
      collapseTimer = setTimeout(() => {
        if (detailSection.dataset.visible === "false") {
          frameworkTabs.innerHTML = "";
          detailContent.innerHTML = "";
        }
      }, 360);
    }

    function showToast(label) {
      toastLabel.textContent = label || "该入口";
      toast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("visible"), 2100);
    }

    function bindPlaceholders(root) {
      root = root || document;
      root.querySelectorAll(".placeholder-trigger").forEach(btn => {
        if (btn.dataset.bound) return;
        btn.dataset.bound = "true";
        btn.addEventListener("click", () => {
          const linkName = btn.dataset.linkName;
          const config = linkName && linkConfig[linkName];
          if (config && config.url) {
            if (config.target === "_blank") {
              window.open(config.url, "_blank", "noopener,noreferrer");
            } else {
              window.location.href = config.url;
            }
            return;
          }
          showToast(btn.dataset.label);
        });
      });
    }

    document.querySelectorAll(".stage-main").forEach(btn => {
      btn.addEventListener("click", () => {
        if (selectedStage === btn.dataset.stage && detailSection.dataset.visible === "true") collapseDetails();
        else renderSelection(btn.dataset.stage, 0, true);
      });
    });
    document.querySelectorAll(".journey-node").forEach(btn => {
      btn.addEventListener("click", () => {
        if (selectedStage === btn.dataset.stage && detailSection.dataset.visible === "true") collapseDetails();
        else renderSelection(btn.dataset.stage, 0, true);
      });
    });
    document.querySelectorAll(".stage").forEach(card => {
      card.addEventListener("click", e => {
        if (e.target.closest("button")) return;
        if (selectedStage === card.dataset.stage && detailSection.dataset.visible === "true") collapseDetails();
        else renderSelection(card.dataset.stage, 0, true);
      });
    });
    document.querySelectorAll(".stage-group").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        const groupIndex = Number(btn.dataset.groupIndex);
        if (selectedStage === btn.dataset.stage && selectedGroup === groupIndex && detailSection.dataset.visible === "true") {
          collapseDetails();
        } else {
          renderSelection(btn.dataset.stage, groupIndex, true);
        }
      });
    });

    const dataToolsHeading = document.getElementById("data-tools-heading");
    const dataToolsPanel = document.getElementById("data-tools-panel");
    detailSection.insertAdjacentElement("afterend", dataToolsHeading);
    dataToolsHeading.insertAdjacentElement("afterend", dataToolsPanel);

    // 后续接入真实阶段判断时，只需替换此函数的返回值。
    function resolveCurrentStage() {
      return "launch";
    }
    const currentStageKey = resolveCurrentStage();
    const currentStageIndex = Object.keys(stages).indexOf(currentStageKey);
    journeyRail.style.setProperty("--progress-width", (currentStageIndex * 25) + "%");
    journeyStatus.style.left = (12.5 + currentStageIndex * 25) + "%";
    document.querySelectorAll(".journey-node").forEach((node, index) => {
      node.dataset.state = index < currentStageIndex ? "complete" : index === currentStageIndex ? "current" : "future";
    });
    document.querySelectorAll(".stage").forEach(card => card.dataset.selected = String(card.dataset.stage === currentStageKey));
    document.querySelectorAll(".stage-main").forEach(btn => btn.setAttribute("aria-selected", String(btn.dataset.stage === currentStageKey)));
    syncUpdateIndicators();
    bindPlaceholders();
    document.addEventListener("click", e => {
      if (detailSection.dataset.visible !== "true") return;
      if (e.target.closest(".map-canvas, .journey-rail, .detail-section")) return;
      collapseDetails();
    });
  </script>
</body>
</html>
